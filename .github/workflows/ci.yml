name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript型チェック
        run: npx tsc --noEmit

      - name: Lint（ESLint）
        run: npx eslint src/ --ext .ts,.tsx

      - name: ビルド確認
        run: npm run build
